name: Run tests

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          use-mamba: true
          miniforge-variant: Miniforge3
          miniforge-version: latest
          activate-environment: anaconda-client-env

      - name: Install conda packages
        shell: bash -l {0}
        run: |
          mamba install --file requirements.txt

      - name: Install Eigen
        shell: bash -l {0}
        run: |
          git clone --branch 3.4.0 https://gitlab.com/libeigen/eigen.git
          cd eigen
          mkdir build
          cd build
          cmake -DBUILD_TESTING=OFF  -DINCLUDE_INSTALL_DIR=$CONDA_PREFIX/include -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX ..
          make install
          cd ../..

      - name: Install Autodiff
        shell: bash -l {0}
        run: |
          git clone --branch v1.1.0 https://github.com/autodiff/autodiff.git
          cd autodiff
          mkdir build
          cd build
          cmake -DAUTODIFF_BUILD_TESTS=OFF \
            -DAUTODIFF_BUILD_PYTHON=OFF \
            -DAUTODIFF_BUILD_EXAMPLES=OFF \
            -DAUTODIFF_BUILD_DOCS=OFF \
            -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
            ..
          make install
          cd ../..

      - name: Install Fastor
        shell: bash -l {0}
        run: |
          git clone https://github.com/romeric/Fastor.git
          cd Fastor
          cmake -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX .
          make install
          cd ..

      - name: Install Marmot
        shell: bash -l {0}
        run: |
          # Determine the current branch name
          # For PRs: github.head_ref. For pushes: github.ref_name.
          TARGET_BRANCH="${{ github.head_ref || github.ref_name }}"
          
          echo "Target branch is $TARGET_BRANCH"
          
          # Clone without specifying a branch initially
          git clone --recurse-submodules https://github.com/MAteRialMOdelingToolbox/Marmot/
          cd Marmot
          
          # Try to switch to the matching branch; if it fails, stay on default (master)
          git checkout $TARGET_BRANCH || echo "Branch $TARGET_BRANCH not found in Marmot, using default branch."
          
          mkdir build
          cd build
          cmake -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX ..
          make install
          cd ../../

      - name: Build EdelweissFE
        shell: bash -l {0}
        run: |
          pip install .

      - name: Run tests
        shell: bash -l {0}
        run: |
          run_tests_edelweissfe ./testfiles/

